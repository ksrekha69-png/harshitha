<!DOCTYPE html>

      <!-- Text Content -->
      <div class="hero-content animate-on-scroll" style="flex: 1; min-width: 300px;">

      <div class="hero-image animate-on-scroll delay-200" style="flex: 1; min-width: 300px; display: flex; justify-content: center; position: relative;">
        <!-- Glowing Background behind image -->
        <div style="position: absolute; width: 100%; height: 100%; max-width: 350px; max-height: 350px; background: radial-gradient(circle, var(--primary) 0%, transparent 70%); opacity: 0.3; filter: blur(40px); z-index: -1;"></div>
        
        <img src="WhatsApp Image 2026-05-06 at 12.05.27 PM.jpeg" alt="Harshitha" style="width: 100%; max-width: 350px; height: 350px; object-fit: cover; border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; border: 4px solid var(--surface-color); box-shadow: 0 20px 40px rgba(0,0,0,0.4); animation: float 6s ease-in-out infinite;">
      </div>

    </div>

  <script src="js/main.js"></script>
